<svg viewBox="0 0 540 300" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <radialGradient id="bg" cx="40%%" cy="40%%" r="70%%">
      <stop offset="0%%" stop-color="#1e1b4b"/>
      <stop offset="100%%" stop-color="#0a0818"/>
    </radialGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <rect width="540" height="300" fill="url(#bg)"/>
  <!-- Diagonal accent bar -->
  <rect x="0" y="0" width="540" height="6" fill="#25D366" opacity="0.7"/>
  <!-- Background hex grid -->
  <g opacity="0.06" stroke="#818cf8" stroke-width="0.8">
    <line x1="0" y1="75" x2="540" y2="75"/>
    <line x1="0" y1="150" x2="540" y2="150"/>
    <line x1="0" y1="225" x2="540" y2="225"/>
    <line x1="135" y1="0" x2="135" y2="300"/>
    <line x1="270" y1="0" x2="270" y2="300"/>
    <line x1="405" y1="0" x2="405" y2="300"/>
  </g>
  <!-- Central icon glow -->
  <circle cx="170" cy="150" r="70" fill="#25D366" opacity="0.06" filter="url(#glow)"/>
  <circle cx="170" cy="150" r="50" fill="#1e1b4b" stroke="#25D366" stroke-width="1.5" opacity="0.9" filter="url(#glow)"/>
  <text x="170" y="165" text-anchor="middle" font-size="32">💬</text>
  <!-- Category tag -->
  <rect x="24" y="22" width="80" height="24" rx="12" fill="#25D366" opacity="0.15"/>
  <rect x="24" y="22" width="80" height="24" rx="12" fill="none" stroke="#25D366" stroke-width="1"/>
  <text x="64" y="38" text-anchor="middle" font-family="sans-serif" font-size="10" font-weight="700" fill="#25D366">TUTORIAL</text>
  <!-- Text content -->
  <text x="300" y="110" font-family="sans-serif" font-size="24" font-weight="800" fill="#25D366" filter="url(#glow)">WhatsApp + IA</text>
  <text x="300" y="145" font-family="sans-serif" font-size="14" font-weight="700" fill="rgba(255,255,255,0.85)">Automatize seu</text>
  <text x="300" y="168" font-family="sans-serif" font-size="12" fill="rgba(255,255,255,0.5)">Automatize seu atendimento</text>
  <!-- Clica AI label -->
  <text x="300" y="265" font-family="sans-serif" font-size="10" fill="#25D366" opacity="0.7" font-weight="700">CLICA AI · BLOG</text>
  <!-- Node decorations -->
  <g filter="url(#glow)" opacity="0.7">
    <circle cx="80" cy="60" r="3" fill="#25D366"/>
    <circle cx="500" cy="50" r="2.5" fill="#25D366"/>
    <circle cx="490" cy="250" r="3" fill="#25D366"/>
    <circle cx="50" cy="240" r="2" fill="#25D366"/>
  </g>
  <line x1="220" y1="150" x2="285" y2="150" stroke="#25D366" stroke-width="1" stroke-dasharray="3 3" opacity="0.4"/>
</svg>