<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Blog — Clica AI</title>
  <meta name="description" content="Artigos sobre inteligência artificial, automação de processos e cases de sucesso. Aprenda como a IA pode transformar seu negócio.">
  <meta property="og:title" content="Blog — Clica AI">
  <meta property="og:description" content="Tutoriais, tendências e cases sobre IA aplicada nos negócios.">
  <link rel="stylesheet" href="../assets/css/global.css">
  <link rel="stylesheet" href="../assets/css/components.css">
</head>
<body>

  <div id="header-placeholder"></div>

  <section class="page-hero">
    <div class="page-hero-bg">
      <img src="../assets/images/hero-blog.svg" alt="Blog Clica AI">
    </div>
    <div class="page-hero-content">
      <span class="section-label">Conhecimento</span>
      <h1>Blog <span class="text-gold">Clica AI</span></h1>
      <p>Tutoriais práticos, tendências do mundo de IA e cases reais para você ficar sempre à frente.</p>
    </div>
  </section>

  <section style="padding: var(--section-padding);">
    <div class="container">

      <!-- Filtros -->
      <div class="filter-bar" id="blog-filters" style="margin-bottom:40px;">
        <button class="filter-btn active" data-category="all">Todos</button>
        <button class="filter-btn" data-category="tutoriais">Tutoriais</button>
        <button class="filter-btn" data-category="tendencias">Tendências</button>
        <button class="filter-btn" data-category="cases">Cases</button>
      </div>

      <!-- Grid de posts -->
      <div class="blog-grid" id="blog-grid">
        <p style="text-align:center;padding:60px 0;color:var(--text-secondary);">Carregando artigos...</p>
      </div>

    </div>
  </section>

  <!-- CTA -->
  <section class="cta-section">
    <div class="container" style="position:relative;z-index:1;">
      <h2>Quer aplicar IA no seu <span class="text-gold">negócio?</span></h2>
      <p>Fale com nossos especialistas e descubra por onde começar.</p>
      <div class="cta-buttons">
        <a href="https://wa.me/553531959999" target="_blank" rel="noopener" class="btn btn-primary">
          💬 Falar com especialista
        </a>
      </div>
    </div>
  </section>

  <div id="footer-placeholder"></div>
  <script src="../assets/js/main.js"></script>
  <script src="../assets/js/blog.js"></script>
</body>
