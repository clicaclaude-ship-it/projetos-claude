<svg viewBox="0 0 1200 675" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <radialGradient id="bg" cx="50%" cy="50%" r="70%">
      <stop offset="0%" stop-color="#1a1040"/>
      <stop offset="100%" stop-color="#0a0818"/>
    </radialGradient>
    <linearGradient id="gold" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#f7971e"/>
      <stop offset="100%" stop-color="#ffd200"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="5" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <rect width="1200" height="675" fill="url(#bg)"/>

  <!-- Central diamond / value crystal -->
  <g transform="translate(600, 337)" filter="url(#glow)">
    <!-- Outer glow -->
    <polygon points="0,-180 160,0 0,180 -160,0" fill="url(#gold)" opacity="0.06"/>
    <polygon points="0,-180 160,0 0,180 -160,0" fill="none" stroke="url(#gold)" stroke-width="1.5" opacity="0.4"/>
    <!-- Middle diamond -->
    <polygon points="0,-130 110,0 0,130 -110,0" fill="url(#gold)" opacity="0.08"/>
    <polygon points="0,-130 110,0 0,130 -110,0" fill="none" stroke="url(#gold)" stroke-width="2" opacity="0.6"/>
    <!-- Inner diamond -->
    <polygon points="0,-80 65,0 0,80 -65,0" fill="url(#gold)" opacity="0.15"/>
    <polygon points="0,-80 65,0 0,80 -65,0" fill="none" stroke="url(#gold)" stroke-width="2.5" opacity="0.8"/>
    <!-- Core -->
    <polygon points="0,-40 32,0 0,40 -32,0" fill="url(#gold)" opacity="0.9"/>

    <!-- Diamond facet lines -->
    <g stroke="url(#gold)" stroke-width="1" opacity="0.35" fill="none">
      <line x1="0" y1="-130" x2="110" y2="0"/>
      <line x1="110" y1="0" x2="0" y2="130"/>
      <line x1="0" y1="130" x2="-110" y2="0"/>
      <line x1="-110" y1="0" x2="0" y2="-130"/>
      <line x1="0" y1="-130" x2="0" y2="130"/>
      <line x1="-110" y1="0" x2="110" y2="0"/>
      <line x1="-110" y1="0" x2="0" y2="-80"/>
      <line x1="110" y1="0" x2="0" y2="-80"/>
      <line x1="-110" y1="0" x2="0" y2="80"/>
      <line x1="110" y1="0" x2="0" y2="80"/>
    </g>

    <!-- Value symbol -->
    <text x="0" y="8" text-anchor="middle" font-family="sans-serif" font-size="22" font-weight="800" fill="#0f0c29">R$</text>
  </g>

  <!-- Orbiting value badges -->
  <g filter="url(#glow)">
    <!-- ROI badge -->
    <g transform="translate(350, 180)">
      <rect x="-55" y="-22" width="110" height="44" rx="22" fill="#302b63" stroke="url(#gold)" stroke-width="1.5" opacity="0.9"/>
      <text x="0" y="6" text-anchor="middle" font-family="sans-serif" font-size="13" font-weight="700" fill="#ffd200">ROI comprovado</text>
    </g>
    <!-- Speed badge -->
    <g transform="translate(850, 200)">
      <rect x="-50" y="-22" width="100" height="44" rx="22" fill="#302b63" stroke="#a78bfa" stroke-width="1.5" opacity="0.9"/>
      <text x="0" y="6" text-anchor="middle" font-family="sans-serif" font-size="13" font-weight="700" fill="#c084fc">Proposta em 48h</text>
    </g>
    <!-- Personalized badge -->
    <g transform="translate(320, 500)">
      <rect x="-60" y="-22" width="120" height="44" rx="22" fill="#302b63" stroke="#f7971e" stroke-width="1.5" opacity="0.9"/>
      <text x="0" y="6" text-anchor="middle" font-family="sans-serif" font-size="13" font-weight="700" fill="#f7971e">Sob medida</text>
    </g>
    <!-- Free diagnosis badge -->
    <g transform="translate(880, 490)">
      <rect x="-65" y="-22" width="130" height="44" rx="22" fill="#302b63" stroke="#ffd200" stroke-width="1.5" opacity="0.9"/>
      <text x="0" y="6" text-anchor="middle" font-family="sans-serif" font-size="13" font-weight="700" fill="#ffd200">Diagnóstico grátis</text>
    </g>
  </g>

  <!-- Lines connecting badges to diamond -->
  <g opacity="0.3" stroke="url(#gold)" stroke-width="1" stroke-dasharray="4 4" fill="none">
    <line x1="405" y1="180" x2="520" y2="270"/>
    <line x1="800" y1="200" x2="690" y2="270"/>
    <line x1="380" y1="500" x2="510" y2="400"/>
    <line x1="815" y1="490" x2="690" y2="400"/>
  </g>

  <!-- Step indicators -->
  <g font-family="sans-serif">
    <g transform="translate(200, 337)">
      <circle cx="0" cy="0" r="24" fill="#302b63" stroke="url(#gold)" stroke-width="2" filter="url(#glow)" opacity="0.9"/>
      <text x="0" y="6" text-anchor="middle" font-size="14" font-weight="800" fill="#ffd200">01</text>
      <text x="0" y="55" text-anchor="middle" font-size="11" fill="rgba(255,255,255,0.5)">Conversa</text>
    </g>
    <line x1="224" y1="337" x2="276" y2="337" stroke="url(#gold)" stroke-width="1" stroke-dasharray="3 3" opacity="0.4"/>

    <g transform="translate(300, 337)">
      <circle cx="0" cy="0" r="24" fill="#302b63" stroke="#f7971e" stroke-width="2" filter="url(#glow)" opacity="0.9"/>
      <text x="0" y="6" text-anchor="middle" font-size="14" font-weight="800" fill="#f7971e">02</text>
      <text x="0" y="55" text-anchor="middle" font-size="11" fill="rgba(255,255,255,0.5)">Diagnóstico</text>
    </g>
    <line x1="324" y1="337" x2="376" y2="337" stroke="url(#gold)" stroke-width="1" stroke-dasharray="3 3" opacity="0.4"/>

    <!-- 03 and 04 on the right side -->
    <g transform="translate(900, 337)">
      <circle cx="0" cy="0" r="24" fill="#302b63" stroke="#a78bfa" stroke-width="2" filter="url(#glow)" opacity="0.9"/>
      <text x="0" y="6" text-anchor="middle" font-size="14" font-weight="800" fill="#a78bfa">03</text>
      <text x="0" y="55" text-anchor="middle" font-size="11" fill="rgba(255,255,255,0.5)">Proposta</text>
    </g>
    <line x1="924" y1="337" x2="976" y2="337" stroke="url(#gold)" stroke-width="1" stroke-dasharray="3 3" opacity="0.4"/>

    <g transform="translate(1000, 337)">
      <circle cx="0" cy="0" r="24" fill="#302b63" stroke="url(#gold)" stroke-width="2" filter="url(#glow)" opacity="0.9"/>
      <text x="0" y="6" text-anchor="middle" font-size="14" font-weight="800" fill="#ffd200">04</text>
      <text x="0" y="55" text-anchor="middle" font-size="11" fill="rgba(255,255,255,0.5)">Resultado</text>
    </g>
  </g>

  <!-- Decorative hex patterns -->
  <g opacity="0.08" stroke="#a78bfa" stroke-width="1" fill="none">
    <polygon points="100,100 130,83 160,100 160,133 130,150 100,133"/>
    <polygon points="1040,540 1070,523 1100,540 1100,573 1070,590 1040,573"/>
    <polygon points="1100,100 1130,83 1160,100 1160,133 1130,150 1100,133"/>
  </g>

  <!-- Particles -->
  <g filter="url(#glow)" opacity="0.7">
    <circle cx="150" cy="500" r="2.5" fill="#ffd200"/>
    <circle cx="1050" cy="150" r="2" fill="#ffd200"/>
    <circle cx="200" cy="200" r="2" fill="#a78bfa"/>
    <circle cx="1000" cy="550" r="2.5" fill="#c084fc"/>
  </g>
</svg>
