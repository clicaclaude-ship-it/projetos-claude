<svg viewBox="0 0 700 420" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <radialGradient id="bg" cx="50%" cy="50%" r="70%">
      <stop offset="0%" stop-color="#1a1040"/>
      <stop offset="100%" stop-color="#0a0818"/>
    </radialGradient>
    <linearGradient id="gold" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#f7971e"/>
      <stop offset="100%" stop-color="#ffd200"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <rect width="700" height="420" fill="url(#bg)"/>

  <!-- Timeline path -->
  <path d="M80,210 C180,210 180,120 280,120 C380,120 380,300 480,300 C560,300 580,210 620,210"
        fill="none" stroke="url(#gold)" stroke-width="2.5" filter="url(#glow)" opacity="0.7"/>

  <!-- Timeline milestones -->
  <!-- Start -->
  <g transform="translate(80, 210)" filter="url(#glow)">
    <circle cx="0" cy="0" r="18" fill="#302b63" stroke="url(#gold)" stroke-width="2" opacity="0.95"/>
    <text x="0" y="5" text-anchor="middle" font-size="14">🌱</text>
    <text x="0" y="38" text-anchor="middle" font-family="sans-serif" font-size="10" fill="#ffd200" font-weight="700">FUNDAÇÃO</text>
    <text x="0" y="50" text-anchor="middle" font-family="sans-serif" font-size="9" fill="rgba(255,255,255,0.5)">2022</text>
  </g>

  <!-- Milestone 2 -->
  <g transform="translate(280, 120)" filter="url(#glow)">
    <circle cx="0" cy="0" r="18" fill="#302b63" stroke="#a78bfa" stroke-width="2" opacity="0.95"/>
    <text x="0" y="5" text-anchor="middle" font-size="14">🤝</text>
    <text x="0" y="-28" text-anchor="middle" font-family="sans-serif" font-size="10" fill="#a78bfa" font-weight="700">1º CLIENTE</text>
    <text x="0" y="-16" text-anchor="middle" font-family="sans-serif" font-size="9" fill="rgba(255,255,255,0.5)">2023</text>
  </g>

  <!-- Milestone 3 -->
  <g transform="translate(480, 300)" filter="url(#glow)">
    <circle cx="0" cy="0" r="18" fill="#302b63" stroke="#f7971e" stroke-width="2" opacity="0.95"/>
    <text x="0" y="5" text-anchor="middle" font-size="14">🚀</text>
    <text x="0" y="38" text-anchor="middle" font-family="sans-serif" font-size="10" fill="#f7971e" font-weight="700">ESCALA</text>
    <text x="0" y="50" text-anchor="middle" font-family="sans-serif" font-size="9" fill="rgba(255,255,255,0.5)">2024</text>
  </g>

  <!-- End / Now -->
  <g transform="translate(620, 210)" filter="url(#glow)">
    <circle cx="0" cy="0" r="22" fill="url(#gold)" opacity="0.2"/>
    <circle cx="0" cy="0" r="22" fill="none" stroke="url(#gold)" stroke-width="2.5" opacity="0.95"/>
    <circle cx="0" cy="0" r="14" fill="url(#gold)" opacity="0.9"/>
    <text x="0" y="5" text-anchor="middle" font-size="12" fill="#1a1a2e">⭐</text>
    <text x="0" y="-32" text-anchor="middle" font-family="sans-serif" font-size="10" fill="#ffd200" font-weight="700">HOJE</text>
    <text x="0" y="-20" text-anchor="middle" font-family="sans-serif" font-size="9" fill="rgba(255,255,255,0.5)">50+ clientes</text>
  </g>

  <!-- Stats bubbles -->
  <g filter="url(#glow)" opacity="0.85">
    <g transform="translate(170, 320)">
      <rect x="-50" y="-20" width="100" height="40" rx="8" fill="#1e1b4b" stroke="#a78bfa" stroke-width="1"/>
      <text x="0" y="-4" text-anchor="middle" font-family="sans-serif" font-size="16" font-weight="800" fill="#a78bfa">50+</text>
      <text x="0" y="10" text-anchor="middle" font-family="sans-serif" font-size="9" fill="rgba(255,255,255,0.5)">empresas</text>
    </g>
    <g transform="translate(380, 80)">
      <rect x="-50" y="-20" width="100" height="40" rx="8" fill="#1e1b4b" stroke="url(#gold)" stroke-width="1"/>
      <text x="0" y="-4" text-anchor="middle" font-family="sans-serif" font-size="16" font-weight="800" fill="#ffd200">10x</text>
      <text x="0" y="10" text-anchor="middle" font-family="sans-serif" font-size="9" fill="rgba(255,255,255,0.5)">produtividade</text>
    </g>
    <g transform="translate(550, 360)">
      <rect x="-50" y="-20" width="100" height="40" rx="8" fill="#1e1b4b" stroke="#f7971e" stroke-width="1"/>
      <text x="0" y="-4" text-anchor="middle" font-family="sans-serif" font-size="16" font-weight="800" fill="#f7971e">5+</text>
      <text x="0" y="10" text-anchor="middle" font-family="sans-serif" font-size="9" fill="rgba(255,255,255,0.5)">setores</text>
    </g>
  </g>

  <!-- Decorative particles -->
  <g filter="url(#glow)" opacity="0.6">
    <circle cx="100" cy="80" r="2.5" fill="#ffd200"/>
    <circle cx="600" cy="80" r="2" fill="#f7971e"/>
    <circle cx="80" cy="360" r="2" fill="#a78bfa"/>
    <circle cx="640" cy="370" r="2.5" fill="#c084fc"/>
    <circle cx="340" cy="380" r="2" fill="#ffd200"/>
    <circle cx="350" cy="40" r="1.5" fill="#818cf8"/>
  </g>
</svg>
