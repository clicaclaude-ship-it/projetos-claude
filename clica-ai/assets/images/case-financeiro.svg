<svg viewBox="0 0 600 340" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <radialGradient id="bg" cx="30%%" cy="40%%" r="70%%">
      <stop offset="0%%" stop-color="#1e1b4b"/>
      <stop offset="100%%" stop-color="#0a0818"/>
    </radialGradient>
    <linearGradient id="accent" x1="0%%" y1="0%%" x2="100%%" y2="100%%">
      <stop offset="0%%" stop-color="#f7971e"/>
      <stop offset="100%%" stop-color="#ffd200"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="4" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <rect width="600" height="340" fill="url(#bg)"/>
  <!-- Grid -->
  <g opacity="0.07" stroke="#818cf8" stroke-width="0.8">
    <line x1="0" y1="85" x2="600" y2="85"/>
    <line x1="0" y1="170" x2="600" y2="170"/>
    <line x1="0" y1="255" x2="600" y2="255"/>
    <line x1="150" y1="0" x2="150" y2="340"/>
    <line x1="300" y1="0" x2="300" y2="340"/>
    <line x1="450" y1="0" x2="450" y2="340"/>
  </g>
  <!-- Sector tag -->
  <rect x="24" y="24" width="90" height="28" rx="14" fill="#818cf8" opacity="0.15"/>
  <rect x="24" y="24" width="90" height="28" rx="14" fill="none" stroke="#818cf8" stroke-width="1.2"/>
  <text x="69" y="43" text-anchor="middle" font-family="sans-serif" font-size="11" font-weight="700" fill="#818cf8">FINANCEIRO</text>
  <!-- Central icon -->
  <g transform="translate(300, 150)" filter="url(#glow)">
    <circle cx="0" cy="0" r="65" fill="#818cf8" opacity="0.08"/>
    <circle cx="0" cy="0" r="50" fill="#1e1b4b" stroke="#818cf8" stroke-width="2" opacity="0.9"/>
    <text x="0" y="14" text-anchor="middle" font-size="38">💳</text>
  </g>
  <!-- Orbit ring -->
  <circle cx="300" cy="150" r="90" fill="none" stroke="#818cf8" stroke-width="0.8" stroke-dasharray="3 8" opacity="0.3"/>
  <!-- Result badge -->
  <g transform="translate(480, 80)" filter="url(#glow)">
    <rect x="-60" y="-36" width="120" height="72" rx="12" fill="#1e1b4b" stroke="#818cf8" stroke-width="1.5" opacity="0.95"/>
    <text x="0" y="-6" text-anchor="middle" font-family="sans-serif" font-size="22" font-weight="800" fill="#818cf8">60%</text>
    <text x="0" y="10" text-anchor="middle" font-family="sans-serif" font-size="9" fill="rgba(255,255,255,0.5)">redução em fraudes</text>
  </g>
  <!-- Description -->
  <text x="24" y="300" font-family="sans-serif" font-size="15" font-weight="700" fill="rgba(255,255,255,0.8)">Detecção de anomalias</text>
  <!-- AI node connections -->
  <g opacity="0.3" stroke="#818cf8" stroke-width="1" fill="none">
    <line x1="115" y1="80" x2="250" y2="130"/>
    <line x1="490" y1="130" x2="350" y2="140"/>
    <line x1="150" y1="240" x2="255" y2="190"/>
    <line x1="420" y1="230" x2="350" y2="180"/>
  </g>
  <g filter="url(#glow)" opacity="0.8">
    <circle cx="115" cy="80" r="5" fill="#818cf8"/>
    <circle cx="490" cy="130" r="4" fill="#818cf8"/>
    <circle cx="150" cy="240" r="4" fill="#818cf8"/>
    <circle cx="420" cy="230" r="5" fill="#818cf8"/>
    <circle cx="80" cy="200" r="3" fill="#818cf8" opacity="0.5"/>
    <circle cx="520" cy="260" r="3" fill="#818cf8" opacity="0.5"/>
  </g>
</svg>