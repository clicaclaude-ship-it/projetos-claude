<svg viewBox="0 0 700 420" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <radialGradient id="bg" cx="50%" cy="50%" r="70%">
      <stop offset="0%" stop-color="#1a1040"/>
      <stop offset="100%" stop-color="#0a0818"/>
    </radialGradient>
    <linearGradient id="gold" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#f7971e"/>
      <stop offset="100%" stop-color="#ffd200"/>
    </linearGradient>
    <radialGradient id="core" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#ffd200" stop-opacity="0.5"/>
      <stop offset="100%" stop-color="#ffd200" stop-opacity="0"/>
    </radialGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="4" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <rect width="700" height="420" fill="url(#bg)"/>

  <!-- AI brain core -->
  <g transform="translate(350, 210)" filter="url(#glow)">
    <!-- Glow aura -->
    <circle cx="0" cy="0" r="100" fill="url(#core)" opacity="0.5"/>
    <!-- Brain outline -->
    <ellipse cx="-20" cy="0" rx="55" ry="65" fill="none" stroke="url(#gold)" stroke-width="2" opacity="0.8"/>
    <ellipse cx="20" cy="0" rx="55" ry="65" fill="none" stroke="url(#gold)" stroke-width="2" opacity="0.8"/>
    <ellipse cx="-20" cy="0" rx="55" ry="65" fill="#1e1b4b" opacity="0.6"/>
    <ellipse cx="20" cy="0" rx="55" ry="65" fill="#1e1b4b" opacity="0.6"/>
    <!-- Brain fold lines -->
    <g stroke="#ffd200" stroke-width="1.2" fill="none" opacity="0.5">
      <path d="M-30,-40 C-10,-50, 10,-50, 30,-40"/>
      <path d="M-40,-15 C-20,-25, 20,-25, 40,-15"/>
      <path d="M-45,10 C-25,0, 25,0, 45,10"/>
      <path d="M-38,35 C-18,25, 18,25, 38,35"/>
      <path d="M-25,55 C-8,45, 8,45, 25,55"/>
    </g>
    <!-- Central divider -->
    <line x1="0" y1="-65" x2="0" y2="65" stroke="url(#gold)" stroke-width="1.5" opacity="0.6"/>
    <!-- Core glow dot -->
    <circle cx="0" cy="0" r="16" fill="url(#gold)" opacity="0.9"/>
    <circle cx="0" cy="0" r="8" fill="#ffd200"/>
  </g>

  <!-- Neural connections flowing outward (organized, clean) -->
  <g filter="url(#glow)" opacity="0.7" stroke="url(#gold)" stroke-width="1.5" fill="none">
    <!-- Top connections -->
    <path d="M350,145 C350,100 330,80 280,60"/>
    <path d="M350,145 C360,100 380,80 430,60"/>
    <!-- Right connections -->
    <path d="M418,200 C460,190 490,170 530,150"/>
    <path d="M418,210 C460,215 490,240 520,270"/>
    <!-- Bottom connections -->
    <path d="M350,275 C350,310 330,330 280,350"/>
    <path d="M350,275 C360,310 380,330 430,350"/>
    <!-- Left connections -->
    <path d="M282,200 C240,190 210,170 170,150"/>
    <path d="M282,210 C240,215 210,240 180,270"/>
  </g>

  <!-- Output nodes (positive outputs) -->
  <g filter="url(#glow)">
    <!-- Top-left: Speed -->
    <g transform="translate(240, 50)">
      <circle cx="0" cy="0" r="26" fill="#1e1b4b" stroke="url(#gold)" stroke-width="1.5" opacity="0.95"/>
      <text x="0" y="4" text-anchor="middle" font-size="18">⚡</text>
    </g>
    <!-- Top-right: Automation -->
    <g transform="translate(460, 50)">
      <circle cx="0" cy="0" r="26" fill="#1e1b4b" stroke="#ffd200" stroke-width="1.5" opacity="0.95"/>
      <text x="0" y="4" text-anchor="middle" font-size="18">🤖</text>
    </g>
    <!-- Right-top: Chart up -->
    <g transform="translate(545, 145)">
      <circle cx="0" cy="0" r="24" fill="#1e1b4b" stroke="#f7971e" stroke-width="1.5" opacity="0.95"/>
      <text x="0" y="4" text-anchor="middle" font-size="18">📈</text>
    </g>
    <!-- Right-bottom: Check -->
    <g transform="translate(535, 275)">
      <circle cx="0" cy="0" r="24" fill="#1e1b4b" stroke="#22c55e" stroke-width="1.5" opacity="0.95"/>
      <text x="0" y="4" text-anchor="middle" font-size="18">✅</text>
    </g>
    <!-- Bottom-right: Money -->
    <g transform="translate(460, 365)">
      <circle cx="0" cy="0" r="26" fill="#1e1b4b" stroke="url(#gold)" stroke-width="1.5" opacity="0.95"/>
      <text x="0" y="4" text-anchor="middle" font-size="18">💰</text>
    </g>
    <!-- Bottom-left: Clock check -->
    <g transform="translate(240, 365)">
      <circle cx="0" cy="0" r="26" fill="#1e1b4b" stroke="#ffd200" stroke-width="1.5" opacity="0.95"/>
      <text x="0" y="4" text-anchor="middle" font-size="18">⏰</text>
    </g>
    <!-- Left-bottom: Data -->
    <g transform="translate(155, 275)">
      <circle cx="0" cy="0" r="24" fill="#1e1b4b" stroke="#a78bfa" stroke-width="1.5" opacity="0.95"/>
      <text x="0" y="4" text-anchor="middle" font-size="18">📊</text>
    </g>
    <!-- Left-top: People -->
    <g transform="translate(165, 145)">
      <circle cx="0" cy="0" r="24" fill="#1e1b4b" stroke="#c084fc" stroke-width="1.5" opacity="0.95"/>
      <text x="0" y="4" text-anchor="middle" font-size="18">👥</text>
    </g>
  </g>

  <!-- Orbit rings -->
  <circle cx="350" cy="210" r="160" fill="none" stroke="url(#gold)" stroke-width="0.8" stroke-dasharray="3 9" opacity="0.2"/>

  <!-- Checkmark ring at top -->
  <g filter="url(#glow)" opacity="0.85">
    <circle cx="350" cy="40" r="18" fill="#22c55e" opacity="0.15"/>
    <circle cx="350" cy="40" r="18" fill="none" stroke="#22c55e" stroke-width="1.5"/>
    <polyline points="340,40 347,47 362,32" fill="none" stroke="#22c55e" stroke-width="2.5" stroke-linecap="round"/>
  </g>

  <!-- Small data particles along connections -->
  <g filter="url(#glow)" opacity="0.8">
    <circle cx="305" cy="90" r="3.5" fill="#ffd200"/>
    <circle cx="400" cy="85" r="3.5" fill="#ffd200"/>
    <circle cx="490" cy="175" r="3" fill="#f7971e"/>
    <circle cx="485" cy="248" r="3" fill="#f7971e"/>
    <circle cx="400" cy="325" r="3.5" fill="#ffd200"/>
    <circle cx="305" cy="330" r="3.5" fill="#ffd200"/>
    <circle cx="215" cy="248" r="3" fill="#a78bfa"/>
    <circle cx="215" cy="175" r="3" fill="#a78bfa"/>
  </g>
</svg>
