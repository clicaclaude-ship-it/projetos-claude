<svg viewBox="0 0 300 300" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <radialGradient id="bg" cx="50%%" cy="40%%" r="70%%">
      <stop offset="0%%" stop-color="#1e1b4b"/>
      <stop offset="100%%" stop-color="#0a0818"/>
    </radialGradient>
    <radialGradient id="avatar" cx="50%%" cy="40%%" r="60%%">
      <stop offset="0%%" stop-color="#22c55e" stop-opacity="0.3"/>
      <stop offset="100%%" stop-color="#22c55e" stop-opacity="0"/>
    </radialGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="4" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <rect width="300" height="300" fill="url(#bg)"/>
  <!-- Subtle grid -->
  <g opacity="0.06" stroke="#818cf8" stroke-width="0.8">
    <line x1="0" y1="100" x2="300" y2="100"/>
    <line x1="0" y1="200" x2="300" y2="200"/>
    <line x1="100" y1="0" x2="100" y2="300"/>
    <line x1="200" y1="0" x2="200" y2="300"/>
  </g>
  <!-- Avatar glow -->
  <circle cx="150" cy="120" r="90" fill="url(#avatar)"/>
  <!-- Avatar circle -->
  <circle cx="150" cy="115" r="60" fill="#1e1b4b" stroke="#22c55e" stroke-width="2.5" filter="url(#glow)"/>
  <!-- Initials -->
  <text x="150" y="128" text-anchor="middle" font-family="sans-serif" font-size="42" font-weight="800" fill="#22c55e">C</text>
  <!-- Body silhouette -->
  <path d="M70,240 C70,200 100,185 150,185 C200,185 230,200 230,240 L230,300 L70,300 Z" fill="#1e1b4b" opacity="0.7"/>
  <path d="M70,240 C70,200 100,185 150,185 C200,185 230,200 230,240" fill="none" stroke="#22c55e" stroke-width="1.5" opacity="0.5"/>
  <!-- Role badge -->
  <rect x="90" y="255" width="120" height="24" rx="12" fill="#22c55e" opacity="0.15"/>
  <rect x="90" y="255" width="120" height="24" rx="12" fill="none" stroke="#22c55e" stroke-width="1"/>
  <text x="150" y="271" text-anchor="middle" font-family="sans-serif" font-size="10" font-weight="700" fill="#22c55e">Consultoria</text>
  <!-- Decorative nodes -->
  <g filter="url(#glow)" opacity="0.6">
    <circle cx="40" cy="50" r="3" fill="#22c55e"/>
    <circle cx="260" cy="70" r="2.5" fill="#22c55e"/>
    <circle cx="30" cy="250" r="2" fill="#22c55e"/>
    <circle cx="270" cy="240" r="3" fill="#22c55e"/>
  </g>
</svg>