<svg viewBox="0 0 1200 675" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <radialGradient id="bg" cx="50%" cy="45%" r="65%">
      <stop offset="0%" stop-color="#1e1b4b"/>
      <stop offset="100%" stop-color="#0a0818"/>
    </radialGradient>
    <linearGradient id="gold" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#f7971e"/>
      <stop offset="100%" stop-color="#ffd200"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="4" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <rect width="1200" height="675" fill="url(#bg)"/>

  <!-- Open book shape -->
  <g transform="translate(600, 337)" filter="url(#glow)">
    <!-- Left page -->
    <path d="M-180,-140 C-180,-145 -185,-148 -190,-148 C-220,-148 -250,-130 -260,-100 L-260,140 C-250,110 -220,95 -190,95 C-185,95 -180,92 -180,88 Z"
          fill="#1a1040" stroke="url(#gold)" stroke-width="1.5" opacity="0.9"/>
    <!-- Left page lines -->
    <g opacity="0.35" stroke="#ffd200" stroke-width="1.2" fill="none">
      <line x1="-240" y1="-80" x2="-195" y2="-80"/>
      <line x1="-240" y1="-60" x2="-195" y2="-60"/>
      <line x1="-240" y1="-40" x2="-195" y2="-40"/>
      <line x1="-240" y1="-20" x2="-195" y2="-20"/>
      <line x1="-240" y1="0" x2="-195" y2="0"/>
      <line x1="-240" y1="20" x2="-195" y2="20"/>
      <line x1="-240" y1="40" x2="-195" y2="40"/>
      <line x1="-240" y1="60" x2="-215" y2="60"/>
    </g>

    <!-- Right page -->
    <path d="M180,-140 C180,-145 185,-148 190,-148 C220,-148 250,-130 260,-100 L260,140 C250,110 220,95 190,95 C185,95 180,92 180,88 Z"
          fill="#1a1040" stroke="url(#gold)" stroke-width="1.5" opacity="0.9"/>
    <!-- Right page lines -->
    <g opacity="0.35" stroke="#a78bfa" stroke-width="1.2" fill="none">
      <line x1="195" y1="-80" x2="240" y2="-80"/>
      <line x1="195" y1="-60" x2="240" y2="-60"/>
      <line x1="195" y1="-40" x2="240" y2="-40"/>
      <line x1="195" y1="-20" x2="225" y2="-20"/>
      <line x1="195" y1="0" x2="240" y2="0"/>
      <line x1="195" y1="20" x2="230" y2="20"/>
      <line x1="195" y1="40" x2="240" y2="40"/>
      <line x1="195" y1="60" x2="210" y2="60"/>
    </g>

    <!-- Spine -->
    <path d="M-180,-140 C-120,-145 120,-145 180,-140 L180,88 C120,83 -120,83 -180,88 Z"
          fill="#302b63" stroke="url(#gold)" stroke-width="2" opacity="0.95"/>
    <!-- Spine line -->
    <line x1="0" y1="-140" x2="0" y2="88" stroke="url(#gold)" stroke-width="1.5" opacity="0.6"/>
  </g>

  <!-- AI streams rising from the book -->
  <g filter="url(#glow)" opacity="0.7">
    <!-- Stream 1 -->
    <path d="M540,240 C530,180 520,120 530,60 C535,30 545,10 555,0" fill="none" stroke="#ffd200" stroke-width="1.5"/>
    <!-- Stream 2 -->
    <path d="M570,225 C565,160 560,90 570,30" fill="none" stroke="#f7971e" stroke-width="1.5"/>
    <!-- Stream 3 -->
    <path d="M600,220 C600,150 600,80 600,20" fill="none" stroke="url(#gold)" stroke-width="2"/>
    <!-- Stream 4 -->
    <path d="M630,225 C635,160 640,90 630,30" fill="none" stroke="#f7971e" stroke-width="1.5"/>
    <!-- Stream 5 -->
    <path d="M660,240 C670,180 680,120 670,60 C665,30 655,10 645,0" fill="none" stroke="#ffd200" stroke-width="1.5"/>
  </g>

  <!-- Knowledge nodes floating above book -->
  <g filter="url(#glow)">
    <!-- Tutoriais -->
    <g transform="translate(450, 80)">
      <circle cx="0" cy="0" r="32" fill="#1e1b4b" stroke="url(#gold)" stroke-width="2"/>
      <text x="0" y="-4" text-anchor="middle" font-family="sans-serif" font-size="9" font-weight="700" fill="#ffd200">TUTORIAL</text>
      <text x="0" y="9" text-anchor="middle" font-family="sans-serif" font-size="16">📚</text>
    </g>
    <!-- IA -->
    <g transform="translate(600, 50)">
      <circle cx="0" cy="0" r="38" fill="#302b63" stroke="url(#gold)" stroke-width="2.5"/>
      <text x="0" y="-5" text-anchor="middle" font-family="sans-serif" font-size="9" font-weight="700" fill="#ffd200">TENDÊNCIA</text>
      <text x="0" y="10" text-anchor="middle" font-family="sans-serif" font-size="20">🤖</text>
    </g>
    <!-- Cases -->
    <g transform="translate(750, 80)">
      <circle cx="0" cy="0" r="32" fill="#1e1b4b" stroke="#a78bfa" stroke-width="2"/>
      <text x="0" y="-4" text-anchor="middle" font-family="sans-serif" font-size="9" font-weight="700" fill="#a78bfa">CASE</text>
      <text x="0" y="9" text-anchor="middle" font-family="sans-serif" font-size="16">📈</text>
    </g>
  </g>

  <!-- Side article cards -->
  <g opacity="0.75">
    <!-- Left card -->
    <g transform="translate(200, 337)" filter="url(#glow)">
      <rect x="-90" y="-70" width="180" height="140" rx="12" fill="#1a1040" stroke="url(#gold)" stroke-width="1"/>
      <rect x="-78" y="-58" width="156" height="60" rx="6" fill="#302b63" opacity="0.6"/>
      <rect x="-78" y="12" width="120" height="6" rx="3" fill="#ffd200" opacity="0.5"/>
      <rect x="-78" y="24" width="90" height="5" rx="2.5" fill="rgba(255,255,255,0.25)"/>
      <rect x="-78" y="34" width="110" height="5" rx="2.5" fill="rgba(255,255,255,0.2)"/>
      <rect x="-78" y="44" width="70" height="5" rx="2.5" fill="rgba(255,255,255,0.15)"/>
    </g>
    <!-- Right card -->
    <g transform="translate(1000, 337)" filter="url(#glow)">
      <rect x="-90" y="-70" width="180" height="140" rx="12" fill="#1a1040" stroke="#a78bfa" stroke-width="1"/>
      <rect x="-78" y="-58" width="156" height="60" rx="6" fill="#302b63" opacity="0.6"/>
      <rect x="-78" y="12" width="120" height="6" rx="3" fill="#c084fc" opacity="0.5"/>
      <rect x="-78" y="24" width="90" height="5" rx="2.5" fill="rgba(255,255,255,0.25)"/>
      <rect x="-78" y="34" width="110" height="5" rx="2.5" fill="rgba(255,255,255,0.2)"/>
      <rect x="-78" y="44" width="70" height="5" rx="2.5" fill="rgba(255,255,255,0.15)"/>
    </g>
  </g>

  <!-- Particles from streams -->
  <g filter="url(#glow)">
    <circle cx="555" cy="0" r="4" fill="#ffd200" opacity="0.9"/>
    <circle cx="600" cy="20" r="5" fill="url(#gold)" opacity="0.95"/>
    <circle cx="645" cy="0" r="4" fill="#ffd200" opacity="0.9"/>
    <circle cx="510" cy="40" r="3" fill="#f7971e" opacity="0.7"/>
    <circle cx="690" cy="40" r="3" fill="#f7971e" opacity="0.7"/>
    <circle cx="540" cy="130" r="2.5" fill="#ffd200" opacity="0.6"/>
    <circle cx="660" cy="130" r="2.5" fill="#ffd200" opacity="0.6"/>
  </g>

  <!-- Background particles -->
  <g filter="url(#glow)" opacity="0.6">
    <circle cx="100" cy="200" r="2" fill="#ffd200"/>
    <circle cx="1100" cy="300" r="2.5" fill="#f7971e"/>
    <circle cx="150" cy="500" r="2" fill="#a78bfa"/>
    <circle cx="1050" cy="500" r="2" fill="#c084fc"/>
    <circle cx="300" cy="600" r="1.5" fill="#818cf8"/>
    <circle cx="900" cy="100" r="1.5" fill="#818cf8"/>
  </g>
</svg>
