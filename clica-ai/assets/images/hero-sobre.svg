<svg viewBox="0 0 1200 675" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <radialGradient id="bg" cx="50%" cy="50%" r="70%">
      <stop offset="0%" stop-color="#1e1b4b"/>
      <stop offset="100%" stop-color="#0a0818"/>
    </radialGradient>
    <linearGradient id="gold" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#f7971e"/>
      <stop offset="100%" stop-color="#ffd200"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="5" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <rect width="1200" height="675" fill="url(#bg)"/>

  <!-- Connection web background -->
  <g opacity="0.08" stroke="#818cf8" stroke-width="1" fill="none">
    <line x1="200" y1="200" x2="600" y2="337"/>
    <line x1="400" y1="150" x2="600" y2="337"/>
    <line x1="600" y1="337" x2="800" y2="200"/>
    <line x1="600" y1="337" x2="1000" y2="337"/>
    <line x1="600" y1="337" x2="800" y2="500"/>
    <line x1="600" y1="337" x2="400" y2="500"/>
    <line x1="200" y1="200" x2="400" y2="150"/>
    <line x1="800" y1="200" x2="1000" y2="337"/>
    <line x1="1000" y1="337" x2="800" y2="500"/>
    <line x1="400" y1="500" x2="200" y2="400"/>
  </g>

  <!-- People / Team silhouettes -->
  <!-- Central figure -->
  <g transform="translate(600, 200)" filter="url(#glow)" opacity="0.9">
    <circle cx="0" cy="0" r="36" fill="#302b63" stroke="url(#gold)" stroke-width="2.5"/>
    <!-- Head -->
    <circle cx="0" cy="-8" r="12" fill="url(#gold)" opacity="0.9"/>
    <!-- Body -->
    <path d="M-16,8 C-16,4 -10,0 0,0 C10,0 16,4 16,8 L18,30 L-18,30 Z" fill="url(#gold)" opacity="0.7"/>
  </g>

  <!-- Left team member -->
  <g transform="translate(360, 280)" filter="url(#glow)" opacity="0.85">
    <circle cx="0" cy="0" r="30" fill="#1e1b4b" stroke="#a78bfa" stroke-width="2"/>
    <circle cx="0" cy="-7" r="10" fill="#a78bfa" opacity="0.9"/>
    <path d="M-13,7 C-13,3 -8,0 0,0 C8,0 13,3 13,7 L15,24 L-15,24 Z" fill="#a78bfa" opacity="0.6"/>
  </g>

  <!-- Right team member -->
  <g transform="translate(840, 280)" filter="url(#glow)" opacity="0.85">
    <circle cx="0" cy="0" r="30" fill="#1e1b4b" stroke="#c084fc" stroke-width="2"/>
    <circle cx="0" cy="-7" r="10" fill="#c084fc" opacity="0.9"/>
    <path d="M-13,7 C-13,3 -8,0 0,0 C8,0 13,3 13,7 L15,24 L-15,24 Z" fill="#c084fc" opacity="0.6"/>
  </g>

  <!-- Bottom-left team member -->
  <g transform="translate(420, 460)" filter="url(#glow)" opacity="0.8">
    <circle cx="0" cy="0" r="28" fill="#1e1b4b" stroke="#818cf8" stroke-width="2"/>
    <circle cx="0" cy="-6" r="9" fill="#818cf8" opacity="0.9"/>
    <path d="M-12,6 C-12,3 -7,0 0,0 C7,0 12,3 12,6 L14,22 L-14,22 Z" fill="#818cf8" opacity="0.6"/>
  </g>

  <!-- Bottom-right team member -->
  <g transform="translate(780, 460)" filter="url(#glow)" opacity="0.8">
    <circle cx="0" cy="0" r="28" fill="#1e1b4b" stroke="#f7971e" stroke-width="2"/>
    <circle cx="0" cy="-6" r="9" fill="#f7971e" opacity="0.9"/>
    <path d="M-12,6 C-12,3 -7,0 0,0 C7,0 12,3 12,6 L14,22 L-14,22 Z" fill="#f7971e" opacity="0.6"/>
  </g>

  <!-- Connection lines between team members -->
  <g filter="url(#glow)" opacity="0.5" stroke="url(#gold)" stroke-width="1.5" fill="none">
    <line x1="600" y1="200" x2="360" y2="280"/>
    <line x1="600" y1="200" x2="840" y2="280"/>
    <line x1="360" y1="280" x2="420" y2="460"/>
    <line x1="840" y1="280" x2="780" y2="460"/>
    <line x1="420" y1="460" x2="780" y2="460"/>
    <line x1="360" y1="280" x2="840" y2="280"/>
  </g>

  <!-- AI connection nodes on lines -->
  <g filter="url(#glow)">
    <circle cx="480" cy="240" r="5" fill="#ffd200" opacity="0.8"/>
    <circle cx="720" cy="240" r="5" fill="#ffd200" opacity="0.8"/>
    <circle cx="390" cy="370" r="4" fill="#f7971e" opacity="0.7"/>
    <circle cx="810" cy="370" r="4" fill="#f7971e" opacity="0.7"/>
    <circle cx="600" cy="460" r="4" fill="#a78bfa" opacity="0.8"/>
  </g>

  <!-- Central AI orb connecting everyone -->
  <g transform="translate(600, 337)" filter="url(#glow)">
    <circle cx="0" cy="0" r="22" fill="url(#gold)" opacity="0.3"/>
    <circle cx="0" cy="0" r="14" fill="url(#gold)" opacity="0.7"/>
    <circle cx="0" cy="0" r="7" fill="#ffd200" opacity="0.95"/>
  </g>

  <!-- Orbit ring -->
  <circle cx="600" cy="337" r="200" fill="none" stroke="url(#gold)" stroke-width="1" stroke-dasharray="4 10" opacity="0.2"/>

  <!-- Mission text bar -->
  <g transform="translate(600, 580)" opacity="0.7">
    <rect x="-200" y="-20" width="400" height="40" rx="20" fill="#302b63" opacity="0.7"/>
    <rect x="-200" y="-20" width="400" height="40" rx="20" fill="none" stroke="url(#gold)" stroke-width="1" opacity="0.6"/>
    <text x="0" y="6" text-anchor="middle" font-family="sans-serif" font-size="14" font-weight="700"
          fill="#ffd200" letter-spacing="3">MISSÃO · VISÃO · IMPACTO</text>
  </g>

  <!-- Stars/particles -->
  <g filter="url(#glow)" opacity="0.7">
    <circle cx="100" cy="100" r="2" fill="#ffd200"/>
    <circle cx="1100" cy="150" r="2.5" fill="#f7971e"/>
    <circle cx="150" cy="580" r="2" fill="#a78bfa"/>
    <circle cx="1050" cy="580" r="2" fill="#ffd200"/>
    <circle cx="200" cy="400" r="1.5" fill="#c084fc"/>
    <circle cx="1000" cy="200" r="1.5" fill="#c084fc"/>
    <circle cx="300" cy="600" r="2" fill="#818cf8"/>
    <circle cx="900" cy="80" r="2" fill="#818cf8"/>
  </g>
</svg>
