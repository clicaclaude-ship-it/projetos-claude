<svg viewBox="0 0 700 420" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <radialGradient id="bg" cx="50%" cy="50%" r="70%">
      <stop offset="0%" stop-color="#1e1040"/>
      <stop offset="100%" stop-color="#0d0a20"/>
    </radialGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <rect width="700" height="420" fill="url(#bg)"/>

  <!-- Chaotic gears representing manual processes -->
  <!-- Big gear center -->
  <g transform="translate(350, 210)" filter="url(#glow)" opacity="0.7">
    <circle cx="0" cy="0" r="70" fill="none" stroke="#ef4444" stroke-width="2"/>
    <circle cx="0" cy="0" r="55" fill="#1e0a0a" stroke="#ef4444" stroke-width="1.5"/>
    <!-- Teeth -->
    <g fill="#ef4444" opacity="0.8">
      <rect x="-7" y="-78" width="14" height="20" rx="3"/>
      <rect x="-7" y="-78" width="14" height="20" rx="3" transform="rotate(40)"/>
      <rect x="-7" y="-78" width="14" height="20" rx="3" transform="rotate(80)"/>
      <rect x="-7" y="-78" width="14" height="20" rx="3" transform="rotate(120)"/>
      <rect x="-7" y="-78" width="14" height="20" rx="3" transform="rotate(160)"/>
      <rect x="-7" y="-78" width="14" height="20" rx="3" transform="rotate(200)"/>
      <rect x="-7" y="-78" width="14" height="20" rx="3" transform="rotate(240)"/>
      <rect x="-7" y="-78" width="14" height="20" rx="3" transform="rotate(280)"/>
      <rect x="-7" y="-78" width="14" height="20" rx="3" transform="rotate(320)"/>
    </g>
    <circle cx="0" cy="0" r="22" fill="#ef4444" opacity="0.2"/>
    <circle cx="0" cy="0" r="12" fill="#ef4444" opacity="0.4"/>
    <!-- X mark in center -->
    <line x1="-8" y1="-8" x2="8" y2="8" stroke="#ef4444" stroke-width="2.5"/>
    <line x1="8" y1="-8" x2="-8" y2="8" stroke="#ef4444" stroke-width="2.5"/>
  </g>

  <!-- Small gear top-left -->
  <g transform="translate(200, 150) rotate(25)" filter="url(#glow)" opacity="0.6">
    <circle cx="0" cy="0" r="40" fill="none" stroke="#f97316" stroke-width="1.5"/>
    <circle cx="0" cy="0" r="30" fill="#1a0f0a" stroke="#f97316" stroke-width="1"/>
    <g fill="#f97316" opacity="0.7">
      <rect x="-4" y="-44" width="8" height="12" rx="2"/>
      <rect x="-4" y="-44" width="8" height="12" rx="2" transform="rotate(45)"/>
      <rect x="-4" y="-44" width="8" height="12" rx="2" transform="rotate(90)"/>
      <rect x="-4" y="-44" width="8" height="12" rx="2" transform="rotate(135)"/>
      <rect x="-4" y="-44" width="8" height="12" rx="2" transform="rotate(180)"/>
      <rect x="-4" y="-44" width="8" height="12" rx="2" transform="rotate(225)"/>
      <rect x="-4" y="-44" width="8" height="12" rx="2" transform="rotate(270)"/>
      <rect x="-4" y="-44" width="8" height="12" rx="2" transform="rotate(315)"/>
    </g>
    <line x1="-20" y1="0" x2="20" y2="0" stroke="#f97316" stroke-width="1" opacity="0.4"/>
    <line x1="0" y1="-20" x2="0" y2="20" stroke="#f97316" stroke-width="1" opacity="0.4"/>
  </g>

  <!-- Small gear right -->
  <g transform="translate(500, 150) rotate(-15)" filter="url(#glow)" opacity="0.6">
    <circle cx="0" cy="0" r="35" fill="none" stroke="#f97316" stroke-width="1.5"/>
    <circle cx="0" cy="0" r="26" fill="#1a0f0a" stroke="#f97316" stroke-width="1"/>
    <g fill="#f97316" opacity="0.7">
      <rect x="-4" y="-39" width="8" height="10" rx="2"/>
      <rect x="-4" y="-39" width="8" height="10" rx="2" transform="rotate(45)"/>
      <rect x="-4" y="-39" width="8" height="10" rx="2" transform="rotate(90)"/>
      <rect x="-4" y="-39" width="8" height="10" rx="2" transform="rotate(135)"/>
      <rect x="-4" y="-39" width="8" height="10" rx="2" transform="rotate(180)"/>
      <rect x="-4" y="-39" width="8" height="10" rx="2" transform="rotate(225)"/>
      <rect x="-4" y="-39" width="8" height="10" rx="2" transform="rotate(270)"/>
      <rect x="-4" y="-39" width="8" height="10" rx="2" transform="rotate(315)"/>
    </g>
  </g>

  <!-- Document stack (manual paperwork) -->
  <g transform="translate(150, 290)" opacity="0.7">
    <rect x="5" y="5" width="100" height="130" rx="4" fill="#1a0f0a" stroke="#f97316" stroke-width="1.5" transform="rotate(-8)"/>
    <rect x="0" y="0" width="100" height="130" rx="4" fill="#1e1040" stroke="#ef4444" stroke-width="1.5"/>
    <rect x="12" y="20" width="60" height="6" rx="3" fill="#ef4444" opacity="0.5"/>
    <rect x="12" y="34" width="76" height="4" rx="2" fill="rgba(255,100,100,0.3)"/>
    <rect x="12" y="44" width="60" height="4" rx="2" fill="rgba(255,100,100,0.2)"/>
    <rect x="12" y="54" width="70" height="4" rx="2" fill="rgba(255,100,100,0.2)"/>
    <rect x="12" y="64" width="50" height="4" rx="2" fill="rgba(255,100,100,0.15)"/>
    <!-- X stamp -->
    <circle cx="70" cy="100" r="18" fill="none" stroke="#ef4444" stroke-width="2" opacity="0.6"/>
    <line x1="60" y1="90" x2="80" y2="110" stroke="#ef4444" stroke-width="2" opacity="0.7"/>
    <line x1="80" y1="90" x2="60" y2="110" stroke="#ef4444" stroke-width="2" opacity="0.7"/>
  </g>

  <!-- Clock (time pressure) -->
  <g transform="translate(520, 300)" filter="url(#glow)" opacity="0.7">
    <circle cx="0" cy="0" r="55" fill="#1e0a0a" stroke="#ef4444" stroke-width="2"/>
    <circle cx="0" cy="0" r="50" fill="none" stroke="#ef4444" stroke-width="0.5" opacity="0.3"/>
    <!-- Clock hands (pointing to almost midnight - pressure) -->
    <line x1="0" y1="0" x2="0" y2="-35" stroke="#ef4444" stroke-width="3" stroke-linecap="round"/>
    <line x1="0" y1="0" x2="28" y2="-18" stroke="#f97316" stroke-width="2" stroke-linecap="round"/>
    <circle cx="0" cy="0" r="4" fill="#ef4444"/>
    <!-- Hour marks -->
    <g stroke="#ef4444" stroke-width="1.5" opacity="0.4">
      <line x1="0" y1="-44" x2="0" y2="-50"/>
      <line x1="0" y1="-44" x2="0" y2="-50" transform="rotate(30)"/>
      <line x1="0" y1="-44" x2="0" y2="-50" transform="rotate(60)"/>
      <line x1="0" y1="-44" x2="0" y2="-50" transform="rotate(90)"/>
      <line x1="0" y1="-44" x2="0" y2="-50" transform="rotate(120)"/>
      <line x1="0" y1="-44" x2="0" y2="-50" transform="rotate(150)"/>
      <line x1="0" y1="-44" x2="0" y2="-50" transform="rotate(180)"/>
      <line x1="0" y1="-44" x2="0" y2="-50" transform="rotate(210)"/>
      <line x1="0" y1="-44" x2="0" y2="-50" transform="rotate(240)"/>
      <line x1="0" y1="-44" x2="0" y2="-50" transform="rotate(270)"/>
      <line x1="0" y1="-44" x2="0" y2="-50" transform="rotate(300)"/>
      <line x1="0" y1="-44" x2="0" y2="-50" transform="rotate(330)"/>
    </g>
  </g>

  <!-- Warning signs -->
  <g filter="url(#glow)" opacity="0.8">
    <polygon points="100,80 115,108 85,108" fill="#ef4444" opacity="0.15"/>
    <polygon points="100,80 115,108 85,108" fill="none" stroke="#ef4444" stroke-width="1.5"/>
    <text x="100" y="102" text-anchor="middle" font-size="14" fill="#ef4444">!</text>

    <polygon points="590,80 605,108 575,108" fill="#f97316" opacity="0.15"/>
    <polygon points="590,80 605,108 575,108" fill="none" stroke="#f97316" stroke-width="1.5"/>
    <text x="590" y="102" text-anchor="middle" font-size="14" fill="#f97316">!</text>
  </g>

  <!-- Tangled lines representing chaos -->
  <g opacity="0.2" stroke="#ef4444" stroke-width="1" fill="none">
    <path d="M250,50 C300,80, 280,120, 310,100 C340,80, 320,150, 350,130"/>
    <path d="M400,60 C430,40, 450,90, 420,100 C390,110, 430,60, 460,80"/>
    <path d="M80,180 C120,200, 110,240, 140,220 C170,200, 160,250, 180,230"/>
  </g>
</svg>
